apiVersion: apps/v1
kind: Deployment
metadata:
  name: dev-ops-react
  labels:
    app: dev-ops-react
spec:
  replicas: 2
  selector:
    matchLabels:
      app: dev-ops-react
  template:
    metadata:
      labels:
        app: dev-ops-react
    spec:
      containers:
        - name: dev-ops-react
          image: sharvesh10/dev-ops-react:9d001e6e
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "250m"
              memory: "256Mi"

 